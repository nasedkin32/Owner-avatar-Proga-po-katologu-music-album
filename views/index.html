<h1>🎧 Каталог музыкальных альбомов</h1>

<p>Учебное Flask-приложение по дисциплине «Информационные системы и программирование»</p>

<a href="{{ url_for('albums.list_albums') }}">Перейти к альбомам</a>

{% if current_user.is_authenticated %}
  <p>Вы вошли как {{ current_user.username }}</p>
  <a href="{{ url_for('auth.logout') }}">Выйти</a>
{% else %}
  <a href="{{ url_for('auth.login') }}">Войти</a>
{% endif %}
